<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-100">
    <div id="app"></div>
    
    <script>
        // Simple routing
        const currentPath = window.location.pathname;
        
        if (currentPath === '/' || currentPath === '/index.html') {
            // Redirect to login
            window.location.href = '/login';
        } else if (currentPath === '/login') {
            renderLogin();
        } else if (currentPath === '/dashboard') {
            renderDashboard();
        } else {
            renderNotFound();
        }
        
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 flex items-center justify-center px-4">
                    <div class="w-full max-w-md">
                        <div class="absolute -top-20 -left-20 w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg">
                            <span class="text-4xl">🏪</span>
                        </div>
                        <div class="bg-white rounded-2xl shadow-2xl p-8 border border-slate-200">
                            <h1 class="text-4xl font-bold text-slate-900 mb-2">Welcome Back</h1>
                            <p class="text-slate-600 mb-8">Sign in to your Smart POS account</p>
                            
                            <form onsubmit="handleLogin(event)" class="space-y-5">
                                <div>
                                    <label class="block text-sm font-semibold text-slate-900 mb-2">Username</label>
                                    <input type="text" id="username" placeholder="admin" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-slate-900 mb-2">Password</label>
                                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500" required>
                                </div>
                                <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white font-semibold rounded-lg hover:shadow-lg transition">Sign In</button>
                            </form>
                            
                            <div class="mt-8 pt-8 border-t border-slate-200">
                                <p class="text-slate-600 text-xs text-center mb-3 font-medium">Demo Credentials</p>
                                <div class="bg-slate-50 rounded-lg p-4 space-y-2 border border-slate-200">
                                    <p class="text-slate-700 text-sm"><span class="font-semibold text-emerald-600">Username:</span> admin</p>
                                    <p class="text-slate-700 text-sm"><span class="font-semibold text-emerald-600">Password:</span> admin123</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = '/dashboard';
            } else {
                alert('Invalid credentials. Use admin/admin123');
            }
        }
        
        function renderDashboard() {
            const loggedIn = localStorage.getItem('loggedIn');
            if (!loggedIn) {
                window.location.href = '/login';
                return;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-slate-50">
                    <div class="max-w-7xl mx-auto p-8">
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="text-4xl font-bold text-slate-900">Smart POS Dashboard</h1>
                            <button onclick="logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Logout</button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                            <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
                                <p class="text-slate-600 text-sm font-medium">Today's Sales</p>
                                <p class="text-3xl font-bold text-emerald-600 mt-2">KES 30,340</p>
                            </div>
                            <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
                                <p class="text-slate-600 text-sm font-medium">Transactions</p>
                                <p class="text-3xl font-bold text-blue-600 mt-2">5</p>
                            </div>
                            <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
                                <p class="text-slate-600 text-sm font-medium">Low Stock Items</p>
                                <p class="text-3xl font-bold text-orange-600 mt-2">2</p>
                            </div>
                            <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
                                <p class="text-slate-600 text-sm font-medium">Total Customers</p>
                                <p class="text-3xl font-bold text-purple-600 mt-2">4</p>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
                            <h2 class="text-lg font-bold text-slate-900 mb-4">✅ System Status</h2>
                            <div class="space-y-2">
                                <p class="text-slate-700">✅ Frontend: Working</p>
                                <p class="text-slate-700">✅ Authentication: Working</p>
                                <p class="text-slate-700">✅ Dashboard: Working</p>
                                <p class="text-slate-700">✅ Mock Data: Loaded</p>
                                <p class="text-slate-700 mt-4"><strong>Your Smart POS System is now operational!</strong></p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderNotFound() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-slate-50 flex items-center justify-center">
                    <div class="text-center">
                        <h1 class="text-6xl font-bold text-slate-900 mb-4">404</h1>
                        <p class="text-slate-600 mb-8">Page not found</p>
                        <a href="/login" class="px-6 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Go to Login</a>
                    </div>
                </div>
            `;
        }
        
        function logout() {
            localStorage.removeItem('loggedIn');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
