<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMart - Mobile Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .product-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
        }
        .product-card { 
            transition: all 0.3s ease; 
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Status Bar -->
    <div class="bg-gradient-to-r from-gray-900 to-gray-800 text-white px-4 py-2 flex items-center justify-between text-xs">
        <span>9:41</span>
        <div class="flex items-center gap-1">
            <span>📶</span>
            <span>📡</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="px-4 py-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-orange-500 to-red-500 bg-clip-text text-transparent">
                        ShopMart
                    </span>
                </div>
                <div class="flex items-center gap-1 text-xs">
                    <span>📍</span>
                    <span class="text-gray-600">Deliver to</span>
                    <span class="font-medium">Nairobi</span>
                    <span class="text-gray-400">▼</span>
                </div>
            </div>
            
            <div class="relative">
                <input
                    type="text"
                    placeholder="Search for products..."
                    class="w-full pl-4 pr-10 py-2.5 bg-gray-100 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-orange-500"
                />
                <button class="absolute right-1 top-1 bottom-1 px-4 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-full">
                    🔍
                </button>
            </div>
        </div>
    </header>

    <!-- Flash Sale Banner -->
    <div class="bg-gradient-to-r from-orange-500 via-red-500 to-pink-500 px-4 py-4 text-white">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">⚡</span>
                <div>
                    <div class="font-bold text-lg">FLASH SALE</div>
                    <div class="text-xs opacity-90">Time-limited offer</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-white/20 backdrop-blur-sm px-2 py-1 rounded">
                    <div class="text-xl font-bold" id="hours">23</div>
                    <div class="text-xs">Hours</div>
                </div>
                <span class="text-xl">:</span>
                <div class="bg-white/20 backdrop-blur-sm px-2 py-1 rounded">
                    <div class="text-xl font-bold" id="minutes">45</div>
                    <div class="text-xs">Mins</div>
                </div>
                <span class="text-xl">:</span>
                <div class="bg-white/20 backdrop-blur-sm px-2 py-1 rounded">
                    <div class="text-xl font-bold" id="seconds">30</div>
                    <div class="text-xs">Secs</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Horizontal Scrolling Mini Cards -->
    <div class="bg-white px-4 py-3 overflow-x-auto">
        <div class="flex gap-3 pb-2" id="miniCards">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Category Icons -->
    <div class="bg-white px-4 py-4 mt-2">
        <div class="grid grid-cols-6 gap-3">
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-yellow-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    🪙
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Coins</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    ⚡
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Super Deals</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-pink-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    🎁
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Prize Land</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    🔥
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Hot Sale</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-purple-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    👕
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Fashion</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center text-2xl shadow-sm hover:scale-110 transition">
                    📱
                </div>
                <span class="text-xs mt-1 text-center text-gray-700">Electronics</span>
            </div>
        </div>
    </div>

    <!-- Super Deals Section -->
    <div class="mt-2 bg-white px-4 py-4">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">⚡</span>
                <h2 class="text-lg font-bold">Super Deals</h2>
            </div>
            <span class="text-sm text-orange-500 font-medium">See all →</span>
        </div>
        <div class="grid grid-cols-3 gap-2" id="superDeals">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Brand Deals Section -->
    <div class="mt-2 bg-white px-4 py-4">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">🏷️</span>
                <h2 class="text-lg font-bold">Brand Deals</h2>
            </div>
            <span class="text-sm text-orange-500 font-medium">See all →</span>
        </div>
        <div class="grid grid-cols-2 gap-3" id="brandDeals">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Hot & Trending Section -->
    <div class="mt-2 bg-white px-4 py-4 pb-24">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">🔥</span>
                <h2 class="text-lg font-bold">Hot & Trending</h2>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3" id="hotTrending">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-50">
        <div class="grid grid-cols-4 gap-1 px-2 py-2">
            <div class="flex flex-col items-center py-2 cursor-pointer text-orange-500">
                <span class="text-2xl">🏠</span>
                <span class="text-xs font-medium mt-1">Home</span>
            </div>
            <div class="flex flex-col items-center py-2 cursor-pointer text-gray-600 hover:text-orange-500">
                <span class="text-2xl">📂</span>
                <span class="text-xs font-medium mt-1">Category</span>
            </div>
            <div class="flex flex-col items-center py-2 cursor-pointer text-gray-600 hover:text-orange-500 relative">
                <span class="text-2xl">🛒</span>
                <span class="absolute top-1 right-6 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold animate-pulse-custom">
                    3
                </span>
                <span class="text-xs font-medium mt-1">Cart</span>
            </div>
            <div class="flex flex-col items-center py-2 cursor-pointer text-gray-600 hover:text-orange-500">
                <span class="text-2xl">👤</span>
                <span class="text-xs font-medium mt-1">Account</span>
            </div>
        </div>
    </nav>

    <script>
        // Mock product data
        const products = [
            { id: 1, name: 'Wireless Earbuds Pro', price: 2499, image: '🎧' },
            { id: 2, name: 'Smart Watch Series 5', price: 8999, image: '⌚' },
            { id: 3, name: 'Phone Case Premium', price: 599, image: '📱' },
            { id: 4, name: 'Portable Charger 20000mAh', price: 1899, image: '🔋' },
            { id: 5, name: 'Bluetooth Speaker', price: 3499, image: '🔊' },
            { id: 6, name: 'USB-C Cable 2m', price: 399, image: '🔌' },
            { id: 7, name: 'Laptop Stand Aluminum', price: 2999, image: '💻' },
            { id: 8, name: 'Wireless Mouse', price: 1299, image: '🖱️' },
            { id: 9, name: 'Mechanical Keyboard', price: 5999, image: '⌨️' },
            { id: 10, name: 'HD Webcam 1080p', price: 4499, image: '📷' },
            { id: 11, name: 'Gaming Headset', price: 6999, image: '🎮' },
            { id: 12, name: 'Phone Holder Car Mount', price: 799, image: '🚗' },
            { id: 13, name: 'LED Desk Lamp', price: 1599, image: '💡' },
            { id: 14, name: 'Fitness Tracker Band', price: 3299, image: '⌚' },
            { id: 15, name: 'Tablet Stand Adjustable', price: 1899, image: '📱' },
            { id: 16, name: 'Screen Protector Glass', price: 499, image: '🛡️' },
            { id: 17, name: 'Power Bank 10000mAh', price: 1499, image: '🔋' },
            { id: 18, name: 'Selfie Ring Light', price: 2199, image: '💡' },
        ];

        // Countdown timer
        let timeLeft = { hours: 23, minutes: 45, seconds: 30 };
        setInterval(() => {
            if (timeLeft.seconds > 0) {
                timeLeft.seconds--;
            } else if (timeLeft.minutes > 0) {
                timeLeft.minutes--;
                timeLeft.seconds = 59;
            } else if (timeLeft.hours > 0) {
                timeLeft.hours--;
                timeLeft.minutes = 59;
                timeLeft.seconds = 59;
            }
            document.getElementById('hours').textContent = String(timeLeft.hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(timeLeft.minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(timeLeft.seconds).padStart(2, '0');
        }, 1000);

        // Generate mini cards
        const miniCardsContainer = document.getElementById('miniCards');
        products.slice(0, 8).forEach(product => {
            const discount = Math.floor(Math.random() * 50 + 20);
            miniCardsContainer.innerHTML += `
                <div class="flex-shrink-0 w-24 cursor-pointer">
                    <div class="relative">
                        <div class="w-24 h-24 bg-gradient-to-br from-orange-100 to-pink-100 rounded-lg flex items-center justify-center overflow-hidden text-4xl">
                            ${product.image}
                        </div>
                        <div class="absolute top-1 right-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold">
                            -${discount}%
                        </div>
                    </div>
                    <div class="text-xs font-bold text-orange-600 mt-1">
                        KES${product.price.toLocaleString()}
                    </div>
                </div>
            `;
        });

        // Generate Super Deals
        const superDealsContainer = document.getElementById('superDeals');
        products.slice(0, 6).forEach(product => {
            const rating = (4 + Math.random()).toFixed(1);
            superDealsContainer.innerHTML += `
                <div class="product-card bg-white border rounded-xl overflow-hidden shadow-sm cursor-pointer">
                    <div class="relative">
                        <div class="aspect-square bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center overflow-hidden text-5xl">
                            ${product.image}
                        </div>
                        <div class="absolute top-1 left-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded font-bold">
                            SALE
                        </div>
                    </div>
                    <div class="p-2">
                        <div class="text-xs line-clamp-2 h-8 mb-1">${product.name}</div>
                        <div class="text-sm font-bold text-orange-600">
                            KES${product.price.toLocaleString()}
                        </div>
                        <div class="flex items-center gap-1 text-xs text-gray-500 mt-1">
                            <span class="text-yellow-400">★★★★★</span>
                            <span>${rating}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        // Generate Brand Deals
        const brandDealsContainer = document.getElementById('brandDeals');
        products.slice(6, 12).forEach(product => {
            const discount = Math.floor(Math.random() * 40 + 30);
            const sold = Math.floor(Math.random() * 5000);
            const rating = (4 + Math.random()).toFixed(1);
            brandDealsContainer.innerHTML += `
                <div class="product-card bg-white border rounded-xl overflow-hidden shadow-sm cursor-pointer">
                    <div class="relative">
                        <div class="aspect-square bg-gradient-to-br from-green-50 to-blue-50 flex items-center justify-center overflow-hidden text-6xl">
                            ${product.image}
                        </div>
                        <div class="absolute top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded-full font-bold">
                            -${discount}%
                        </div>
                        <button class="absolute bottom-2 right-2 bg-white rounded-full p-2 shadow-lg">
                            🛒
                        </button>
                    </div>
                    <div class="p-3">
                        <div class="text-sm line-clamp-2 h-10 mb-2">${product.name}</div>
                        <div class="text-lg font-bold text-orange-600 mb-1">
                            KES${product.price.toLocaleString()}
                        </div>
                        <div class="flex items-center justify-between text-xs">
                            <div class="flex items-center gap-1 text-gray-500">
                                <span class="text-yellow-400">★★★★★</span>
                                <span>${rating}</span>
                            </div>
                            <span class="text-gray-400">${sold}+ sold</span>
                        </div>
                    </div>
                </div>
            `;
        });

        // Generate Hot & Trending
        const hotTrendingContainer = document.getElementById('hotTrending');
        products.slice(12, 18).forEach(product => {
            const sold = Math.floor(Math.random() * 10000);
            const rating = (4 + Math.random()).toFixed(1);
            hotTrendingContainer.innerHTML += `
                <div class="product-card bg-white border rounded-xl overflow-hidden shadow-sm cursor-pointer">
                    <div class="relative">
                        <div class="aspect-square bg-gradient-to-br from-pink-50 to-orange-50 flex items-center justify-center overflow-hidden text-6xl">
                            ${product.image}
                        </div>
                        <button class="absolute bottom-2 right-2 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-full p-2 shadow-lg">
                            🛒
                        </button>
                    </div>
                    <div class="p-3">
                        <div class="text-sm line-clamp-2 h-10 mb-2">${product.name}</div>
                        <div class="text-lg font-bold text-orange-600 mb-1">
                            KES${product.price.toLocaleString()}
                        </div>
                        <div class="flex items-center justify-between text-xs mb-2">
                            <div class="flex items-center gap-1 text-gray-500">
                                <span class="text-yellow-400">★★★★★</span>
                                <span>${rating}</span>
                            </div>
                            <span class="text-gray-400">${sold}+ sold</span>
                        </div>
                        <div class="text-xs text-green-600 font-medium">✓ Free shipping</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
