<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart POS - System Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; max-width: 500px; width: 100%; }
        h1 { color: #10b981; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #6b7280; margin-bottom: 30px; }
        .status { background: #f0fdf4; border-left: 4px solid #10b981; padding: 15px; margin: 20px 0; border-radius: 4px; }
        .status.error { background: #fef2f2; border-left-color: #ef4444; }
        .status.warning { background: #fffbeb; border-left-color: #f59e0b; }
        .status-text { color: #065f46; font-weight: 500; }
        .status.error .status-text { color: #7f1d1d; }
        .status.warning .status-text { color: #92400e; }
        .button { display: inline-block; background: #10b981; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; margin-top: 20px; border: none; cursor: pointer; font-size: 16px; }
        .button:hover { background: #059669; }
        .button.secondary { background: #6b7280; }
        .button.secondary:hover { background: #4b5563; }
        .info { background: #f3f4f6; padding: 15px; border-radius: 6px; margin: 20px 0; font-size: 14px; color: #374151; }
        code { background: #f3f4f6; padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Smart POS System</h1>
        <p class="subtitle">AI-Powered Point of Sale</p>

        <div id="status-container"></div>

        <div class="info">
            <strong>System Status:</strong><br>
            Frontend: <span id="frontend-status">Checking...</span><br>
            Backend: <span id="backend-status">Checking...</span>
        </div>

        <button class="button" onclick="goToApp()">Go to Application</button>
        <button class="button secondary" onclick="testBackend()">Test Backend</button>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function checkStatus() {
            const container = document.getElementById('status-container');
            
            // Check Frontend
            const frontendStatus = document.getElementById('frontend-status');
            frontendStatus.textContent = '✅ Running';

            // Check Backend
            const backendStatus = document.getElementById('backend-status');
            try {
                const response = await fetch(`${API_URL}/health`, { method: 'GET' });
                if (response.ok) {
                    backendStatus.textContent = '✅ Running';
                    container.innerHTML = '<div class="status"><div class="status-text">✅ All systems operational!</div></div>';
                } else {
                    throw new Error('Backend not responding');
                }
            } catch (error) {
                backendStatus.textContent = '❌ Not running';
                container.innerHTML = '<div class="status warning"><div class="status-text">⚠️ Backend not detected. Make sure to run: cd backend && npm run dev:mock</div></div>';
            }
        }

        function goToApp() {
            window.location.href = '/login';
        }

        async function testBackend() {
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    alert('✅ Backend is working!\n\nLogin successful with admin/admin123');
                } else {
                    alert('❌ Backend responded but login failed');
                }
            } catch (error) {
                alert('❌ Cannot connect to backend.\n\nMake sure to run:\ncd backend && npm run dev:mock');
            }
        }

        // Check status on load
        checkStatus();
    </script>
</body>
</html>
