<!DOCTYPE html>
<html>
<head>
  <title>Clear Cache - Smart POS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      color: #333;
      margin: 0 0 20px 0;
      font-size: 32px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.loading {
      background: #fff3cd;
      color: #856404;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔄</div>
    <h1>Clear Cache & Reload</h1>
    <p>Click the button below to clear all cached data and reload the dashboard with fresh data.</p>
    <button onclick="clearAndReload()">Clear Cache Now</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    async function clearAndReload() {
      const status = document.getElementById('status');
      status.className = 'status loading';
      status.textContent = '🔄 Clearing cache...';
      
      try {
        // Clear service workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for(let registration of registrations) {
            await registration.unregister();
          }
        }
        
        // Clear all caches
        if ('caches' in window) {
          const names = await caches.keys();
          for (let name of names) {
            await caches.delete(name);
          }
        }
        
        // Clear localStorage
        localStorage.clear();
        
        // Clear sessionStorage
        sessionStorage.clear();
        
        status.className = 'status success';
        status.textContent = '✅ Cache cleared! Redirecting to dashboard...';
        
        // Redirect to dashboard with cache busting
        setTimeout(() => {
          window.location.href = '/dashboard?nocache=' + Date.now();
        }, 1500);
        
      } catch (error) {
        status.className = 'status';
        status.style.background = '#f8d7da';
        status.style.color = '#721c24';
        status.style.display = 'block';
        status.textContent = '❌ Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
