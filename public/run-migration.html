<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run POS Tables Migration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 4px;
    }
    
    .info-box p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    .info-box p:last-child {
      margin-bottom: 0;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    #result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }
    
    #result.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      display: block;
    }
    
    #result.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      display: block;
    }
    
    #result.info {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      color: #856404;
      display: block;
    }
    
    .result-title {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 18px;
    }
    
    .result-content {
      font-size: 14px;
      line-height: 1.6;
    }
    
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      margin-top: 10px;
      font-size: 12px;
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Create POS Tables</h1>
    <p class="subtitle">Run database migration to enable POS checkout</p>
    
    <div class="info-box">
      <p><strong>What this does:</strong></p>
      <p>Creates the missing <code>transactions</code> and <code>transaction_items</code> tables in your production database.</p>
      <p><strong>Status:</strong> cart_items ✅ | transactions ❌ | transaction_items ❌</p>
    </div>
    
    <button id="runBtn" onclick="runMigration()">
      Run Migration
    </button>
    
    <div id="result"></div>
  </div>

  <script>
    async function runMigration() {
      const btn = document.getElementById('runBtn');
      const result = document.getElementById('result');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Running migration...';
      result.style.display = 'none';
      
      try {
        const response = await fetch('/api/admin/run-migration', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            secret: 'create-pos-tables-2024'
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          result.className = 'success';
          result.innerHTML = `
            <div class="result-title">✅ Success!</div>
            <div class="result-content">
              <p>${data.message}</p>
              <p style="margin-top: 15px;"><strong>Next steps:</strong></p>
              <p>1. Go to <a href="/pos" style="color: #155724; font-weight: 600;">/pos</a></p>
              <p>2. Add products to cart</p>
              <p>3. Complete checkout</p>
              <p>4. Sale should work! 🎉</p>
            </div>
          `;
        } else {
          result.className = 'info';
          result.innerHTML = `
            <div class="result-title">⚠️ Partial Success</div>
            <div class="result-content">
              <p>${data.message}</p>
              <p style="margin-top: 15px;"><strong>Manual action required:</strong></p>
              <p>The API cannot create tables directly. You need to run the SQL manually.</p>
              <p style="margin-top: 10px;">Copy the SQL from <code>lib/create-transactions-table.sql</code> and run it in your database.</p>
              <pre>${JSON.stringify(data.results, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        result.className = 'error';
        result.innerHTML = `
          <div class="result-title">❌ Error</div>
          <div class="result-content">
            <p>${error.message}</p>
            <p style="margin-top: 15px;">The migration could not run via API. You need to run the SQL manually in Supabase SQL Editor.</p>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Run Migration';
      }
    }
  </script>
</body>
</html>
