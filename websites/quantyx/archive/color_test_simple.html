<!DOCTYPE html>
<html>
<head>
    <title>Color Test</title>
</head>
<body style="background-color: #F8F8F8; margin: 0; padding: 20px; font-family: Arial;">
    <h1 style="color: #222222;">Dark Gray Text</h1>
    <button style="background-color: #007BFF; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Electric Blue Button</button>
    <button style="background-color: #8A2BE2; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-left: 10px;">Neon Purple Button</button>
    <div style="background: linear-gradient(135deg, #007BFF, #8A2BE2); color: white; padding: 20px; margin-top: 20px; border-radius: 5px;">
        <p>This is a gradient from Electric Blue to Neon Purple</p>
    </div>
</body>
</html>
