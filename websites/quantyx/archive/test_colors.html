<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Test - QuantyX</title>
    <style>
        :root {
            --primary: #007BFF;
            --accent: #8A2BE2;
            --neutral: #222222;
            --background: #F8F8F8;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: var(--background);
        }

        .test-box {
            width: 200px;
            height: 100px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
        }

        .primary {
            background: var(--primary);
        }

        .accent {
            background: var(--accent);
        }

        .neutral {
            background: var(--neutral);
            color: white;
        }

        h1 {
            color: var(--neutral);
        }

        .info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <h1>QuantyX Color Test</h1>
    <p>If you see colored boxes below, CSS variables are working:</p>
    
    <div class="test-box primary">Primary: #007BFF (Electric Blue)</div>
    <div class="test-box accent">Accent: #8A2BE2 (Neon Purple)</div>
    <div class="test-box neutral">Neutral: #222222 (Dark Gray)</div>
    
    <div class="info">
        <h2>CSS Variables Status</h2>
        <p><strong>Primary Color:</strong> <span style="color: var(--primary);">■ #007BFF</span></p>
        <p><strong>Accent Color:</strong> <span style="color: var(--accent);">■ #8A2BE2</span></p>
        <p><strong>Neutral Color:</strong> <span style="color: var(--neutral);">■ #222222</span></p>
        <p><strong>Background Color:</strong> <span style="background: var(--background); padding: 5px;">■ #F8F8F8</span></p>
    </div>
</body>
</html>
